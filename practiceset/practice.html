<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Technology Dashboard</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <aside class="sidebar">
        <h2>Technologies</h2>

        <ul class="menu">
          <li class="active">
            <i class="fa-solid fa-desktop"></i>
            <span>Frontend</span>
          </li>

          <li>
            <i class="fa-solid fa-server"></i>
            <span>Backend</span>
          </li>

          <li>
            <i class="fa-solid fa-mobile-screen-button"></i>
            <span>Mobile</span>
          </li>

          <li>
            <i class="fa-solid fa-layer-group"></i>
            <span>Platforms</span>
          </li>

          <li>
            <i class="fa-solid fa-database"></i>
            <span>Databases</span>
          </li>
        </ul>
      </aside>

      <main class="main-content">
        <div class="heading">
          <i class="fa-solid fa-desktop"></i>

          <div>
            <h1>Frontend</h1>
            <div class="line"></div>
          </div>
        </div>

        <!-- Technology Cards -->
        <div class="cards">
          <div class="card">
            <img
              src="https://content.techgig.com/photo/70553758/introduction-to-angularjs-and-why-you-should-learn-it.jpg?48655"
              alt=""
            />
            <h3>AngularJS</h3>
          </div>

          <div class="card">
            <img
              src="https://www.pngall.com/wp-content/uploads/15/React-Logo-PNG-Images.png"
              alt=""
            />
            <h3>ReactJS</h3>
          </div>

          <div class="card">
            <img
              src="https://ih1.redbubble.net/image.393347411.1344/pp,504x498-pad,600x600,f8f8f8.u5.jpg"
              alt=""
            />
            <h3>Vue.js</h3>
          </div>

          <div class="card">
            <img
              src="https://tse4.mm.bing.net/th/id/OIP.lx4qgTR_65VjcrIbOAa8iQHaHa?r=0&rs=1&pid=ImgDetMain&o=7&rm=3"
              alt=""
            />
            <h3>JavaScript</h3>
          </div>

          <div class="card">
            <img
              src="https://media.istockphoto.com/id/1392686367/vector/css3-icon-simple-element-from-website-development-collection-filled-css3-icon-for-templates.jpg?s=170667a&w=0&k=20&c=3POBVXal21P3hj1jSN9g2ZSx8zlCqwIfyQSP00Eh9nY="
              alt=""
            />
            <h3>CSS3</h3>
          </div>

          <div class="card">
            <img
              src="https://th.bing.com/th/id/R.ccfc38d0a74fe1cf4ea711a67b0e5fda?rik=tiA9pC9TUdeJLg&riu=http%3a%2f%2fwww.trucsweb.com%2fdocuments%2fimages%2flogos%2fhtml5-topper.png&ehk=V3wEGbvwnIRjJjczLPVpiqQZLEJVd0v%2bTTqaJ1tY1qc%3d&risl=&pid=ImgRaw&r=0"
              alt=""
            />
            <h3>HTML5</h3>
          </div>

          <div class="card">
            <img
              src="https://cdn.freelogovectors.net/wp-content/uploads/2023/09/next-js-logo-freelogovectors.net_.png"
              alt=""
            />
            <h3>Next.js</h3>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
