<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f2f2f2;
      }

      #container {
        width: 320px;
        background: #fff;
        border-radius: 20px;
        position: relative;
        text-align: center;
        box-shadow: 5px 15px rgba(0, 0, 0, 0.2);
      }

      .top {
        height: 140px;
        background: #3f6df5;
        border-radius: 20px 20px 0 0;
      }

      .profile {
        position: absolute;
        top: 70px;
      }

      .profile img {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: 5px solid #fff;
        bottom: auto;
      }

      .content {
        padding: 70px 20px 25px;
      }

      .content h2 {
        text-align: center;
      }

      .content p {
        color: #555;
        text-align: center;
      }

      .social {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-bottom: 20px;
      }

      .social {
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .buttons {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-bottom: 20px;
      }

      .buttons button {
        padding: 10px 28px;
        border: none;
        border-radius: 25px;
        background: #3f6df5;
        color: #fff;
        font-size: 16px;
      }

      .stats {
        display: flex;
        justify-content: space-around;
        color: #555;
        font-size: 15px;
        padding-top: 10px;
        border-top: 1px solid #ddd;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="top"></div>

      <div class="profile">
        <img
          src="https://img.freepik.com/premium-photo/profile-icon-white-background_941097-162014.jpg?w=996"
          alt=""
        />
      </div>

      <div class="content">
        <h2>CodingLab</h2>
        <br />
        <p>YouTuber & Blogger</p>
        <br />

        <div class="social">
          <a href=""> <i class="fa-brands fa-facebook"></i> </a>
          <a href=""><i class="fa-brands fa-instagram"></i></a>
          <a href=""><i class="fa-brands fa-youtube"></i></a>
          <a href=""><i class="fa-brands fa-twitter"></i></a>
        </div>

        <div class="buttons">
          <button>Subscribe</button>
          <button>Message</button>
        </div>

        <div class="stats">
          <span> ♡60.4k</span>
          <span>💬20k</span>
          <span>➜] 12.4k</span>
        </div>
      </div>
    </div>
  </body>
</html>
